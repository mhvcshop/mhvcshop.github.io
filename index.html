<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Katalog Produk - MHVC Shop</title>
    <link rel="icon" type="image/jpg" href="https://scontent.cdninstagram.com/v/t51.2885-19/456699089_1593101537912725_1483424628355688714_n.jpg?stp=dst-jpg_s150x150_tt6&_nc_cat=111&ccb=7-5&_nc_sid=f7ccc5&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLnd3dy4xMDgwLkMzIn0%3D&_nc_ohc=07OvAD7huJEQ7kNvwHa3ilR&_nc_oc=AdoWKN_PAVH5yRPYE1tH5QpES_8dQu9u8tjR2o_MBbAomj9-ZifZZQB1TN_ylCJcgw4&_nc_zt=24&_nc_ht=scontent.cdninstagram.com&_nc_ss=7ba8c&oh=00_AQDAyxfNZZivSuCeeZ67iF7361iNh5gwVqaAOBMBvO-3zg&oe=6A551C81">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0d0214; }
        .katalog-frame { border: none; width: 100%; height: 100%; display: block; padding: 0; margin: 0; height: calc(100% + 20px); margin-bottom: -20px; }
    </style>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</head>
<body>
    <div id="wrapper" style="width: 100%; height: 100%; overflow: hidden;"></div>
    <script src="script.js"></script>
</body>
</html>
