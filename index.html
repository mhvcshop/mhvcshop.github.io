<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MHVC SHOP - Web E-Katalog</title>
    <link rel="icon" type="image/jpg" href="https://scontent.cdninstagram.com/v/t51.2885-19/456699089_1593101537912725_1483424628355688714_n.jpg?stp=dst-jpg_s150x150_tt6&_nc_cat=111&ccb=7-5&_nc_sid=f7ccc5&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLnd3dy4xMDgwLkMzIn0%3D&_nc_ohc=07OvAD7huJEQ7kNvwHa3ilR&_nc_oc=AdoWKN_PAVH5yRPYE1tH5QpES_8dQu9u8tjR2o_MBbAomj9-ZifZZQB1TN_ylCJcgw4&_nc_zt=24&_nc_ht=scontent.cdninstagram.com&_nc_ss=7ba8c&oh=00_AQDAyxfNZZivSuCeeZ67iF7361iNh5gwVqaAOBMBvO-3zg&oe=6A551C81">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0d0214; }
        .katalog-frame { border: none; width: 100%; height: 100%; display: block; padding: 0; margin: 0; height: calc(100% + 20px); margin-bottom: -20px; }
    </style>
    <script>
        // Mengamankan klik kanan dengan cara yang ramah standar browser
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        // Mengamankan tombol F12 dan kombinasi Inspect Element
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.keyCode === 73 || e.keyCode === 74)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'U' || e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        }, false);
    </script>
</head>
<body>
    <div id="wrapper" style="width: 100%; height: 100%; overflow: hidden;"></div>
    <script>
        (function() {
            // Menggunakan kode Base64 asli milikmu secara aman
            var _0x4f2a = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J4SnNMQVdVR2pDMWV2OVpIZ1doWGRnUFBPQ2NsMTAwX3Q4MTM1bVh1Skh3dGYxckZQNlgyVTZTa2RqMXpKU2tWYkpUQS9leGVj";
            var ifrm = document.createElement("iframe");
            
            ifrm.setAttribute("src", atob(_0x4f2a));
            ifrm.className = "katalog-frame";
            ifrm.setAttribute("scrolling", "yes");
            ifrm.setAttribute("allow", "fullscreen");
            
            // PERBAIKAN UTAMA: Mengizinkan komunikasi session tanpa memicu batasan CORS/Clickjacking browser
            ifrm.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups");
            ifrm.setAttribute("referrerpolicy", "no-referrer-when-downgrade");
            
            document.getElementById("wrapper").appendChild(ifrm);
        })();
    </script>
</body>
</html>
